<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Interactive Weather</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        #map { height: 100%; width: 100%; z-index: 1; }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-slate-900 h-screen overflow-hidden flex flex-col">

    <nav class="glass m-4 p-4 rounded-2xl flex justify-between items-center fixed top-0 left-0 right-0 z-50">
        <h1 class="text-2xl font-semibold text-slate-800">Sky<span class="text-blue-600">Cast</span></h1>
        <p class="text-sm text-slate-500 font-medium">Click Map for Live Data</p>
    </nav>

    <div class="flex-grow flex p-4 pt-24 gap-4">
        
        <div class="w-1/3 glass rounded-3xl p-6 flex flex-col gap-6 shadow-2xl z-10 overflow-y-auto">
            <h2 class="text-xl font-semibold text-slate-800">Location Details</h2>
            <div id="weather-content" class="space-y-4">
                <div class="animate-pulse flex space-x-4">
                    <div class="flex-1 space-y-4 py-1">
                        <div class="h-4 bg-slate-300 rounded w-3/4"></div>
                        <div class="space-y-2">
                            <div class="h-12 bg-slate-300 rounded"></div>
                            <div class="h-4 bg-slate-300 rounded w-5/6"></div>
                        </div>
                    </div>
                </div>
                <p class="text-slate-400 text-center italic mt-10">Select a point on the map to begin...</p>
            </div>
            
            <div id="stats" class="grid grid-cols-2 gap-4 mt-auto">
                </div>
        </div>

        <div class="w-2/3 rounded-3xl overflow-hidden shadow-2xl relative">
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Init Map centered on Kolhapur
        const map = L.map('map', { zoomControl: false }).setView([16.7, 74.2], 10);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '©OpenStreetMap'
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        let marker;

        map.on('click', async function(e) {
            const { lat, lng } = e.latlng;
            
            if(marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map);

            const content = document.getElementById('weather-content');
            const stats = document.getElementById('stats');
            
            try {
                const response = await fetch(`http://127.0.0.1:8000/weather/coords/?lat=${lat}&lon=${lng}`);
                const data = await response.json();

                content.innerHTML = `
                    <div class="text-center py-4">
                        <h3 class="text-4xl font-bold text-slate-800">${data.name || 'Unknown'}</h3>
                        <p class="text-blue-500 uppercase tracking-widest text-xs font-semibold mt-1">${data.weather[0].description}</p>
                    </div>
                    <div class="bg-blue-600 rounded-3xl p-8 text-white text-center shadow-lg shadow-blue-200">
                        <span class="text-6xl font-light">${Math.round(data.main.temp)}°</span>
                        <p class="text-blue-100 text-sm mt-2">Feels like ${Math.round(data.main.feels_like)}°C</p>
                    </div>
                `;

                stats.innerHTML = `
                    <div class="bg-white/50 p-4 rounded-2xl text-center">
                        <p class="text-[10px] uppercase text-slate-400 font-bold">Humidity</p>
                        <p class="text-xl font-semibold text-slate-700">${data.main.humidity}%</p>
                    </div>
                    <div class="bg-white/50 p-4 rounded-2xl text-center">
                        <p class="text-[10px] uppercase text-slate-400 font-bold">Pressure</p>
                        <p class="text-xl font-semibold text-slate-700">${data.main.pressure}</p>
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `<p class="text-red-500">Failed to load data. Is FastAPI running?</p>`;
            }
        });
    </script>
</body>
</html>
